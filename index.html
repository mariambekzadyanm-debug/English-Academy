<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Academy - Master English with Confidence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.2;
        }

        /* Navigation */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a1a1a;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #9b59b6;
        }

        .nav-cta {
            background: #1a1a1a;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Hero Section */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 90vh;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .hero-left {
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tagline {
            display: inline-block;
            background: #f3e8ff;
            color: #9333ea;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            width: fit-content;
        }

        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 25px;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: #1a1a1a;
            color: white;
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: 2px solid #1a1a1a;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: white;
            color: #1a1a1a;
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: 2px solid #1a1a1a;
        }

        .btn-secondary:hover {
            background: #f8f8f8;
            transform: translateY(-3px);
        }

        .social-proof {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatars {
            display: flex;
        }

        .avatars img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            margin-left: -10px;
            object-fit: cover;
        }

        .avatars img:first-child {
            margin-left: 0;
        }

        .rating {
            display: flex;
            flex-direction: column;
        }

        .stars {
            color: #fbbf24;
            font-size: 1.1rem;
        }

        .rating-text {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }

        .hero-right {
            background: linear-gradient(135deg, #a7f3d0 0%, #6ee7b7 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .hero-image-container {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            display: block;
        }

        .stat-bubble {
            position: absolute;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
        }

        .stat-bubble.purple {
            background: #f3e8ff;
            color: #9333ea;
            top: 20px;
            right: -10px;
        }

        .stat-bubble.yellow {
            background: #fef3c7;
            color: #d97706;
            bottom: 120px;
            right: -20px;
        }

        .stat-bubble.pink {
            background: #fce7f3;
            color: #db2777;
            bottom: 20px;
            left: -10px;
        }

        /* Programs Section */
        .programs {
            padding: 100px 5%;
            background: white;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .programs-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .program-card {
            padding: 40px 30px;
            border-radius: 24px;
            transition: all 0.4s;
            cursor: pointer;
        }

        .program-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .program-card.green { background: #ecfdf5; }
        .program-card.purple { background: #f3e8ff; }
        .program-card.yellow { background: #fefce8; }
        .program-card.pink { background: #fdf2f8; }

        .program-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .program-card.green .program-icon { background: #a7f3d0; }
        .program-card.purple .program-icon { background: #e9d5ff; }
        .program-card.yellow .program-icon { background: #fef08a; }
        .program-card.pink .program-icon { background: #fbcfe8; }

        .program-card h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
        }

        .program-card p {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .btn-learn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1a1a1a;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .btn-learn:hover {
            border-color: #1a1a1a;
            transform: translateX(5px);
        }

        /* Stats Section */
        .stats-section {
            background: #f3e8ff;
            padding: 80px 5%;
            margin: 40px 5%;
            border-radius: 40px;
        }

        .stats-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .stats-text h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .stats-text p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #9333ea;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .profile-images {
            display: flex;
        }

        .profile-images img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            margin-left: -15px;
            object-fit: cover;
        }

        .profile-images img:first-child {
            margin-left: 0;
        }

        .more-count {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-left: -15px;
            border: 3px solid white;
            color: #9333ea;
        }

        /* About Section */
        .about-section {
            padding: 100px 5%;
            background: white;
        }

        .about-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-image {
            background: #fef3c7;
            border-radius: 30px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .about-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: block;
        }

        .about-text {
            padding: 20px;
        }

        .about-label {
            display: inline-block;
            background: #f3e8ff;
            color: #9333ea;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .about-text h2 {
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        .about-text p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .quote-box {
            background: #a7f3d0;
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            position: relative;
        }

        .quote-box::before {
            content: '"';
            font-size: 4rem;
            color: #9333ea;
            position: absolute;
            top: -10px;
            left: 20px;
            opacity: 0.3;
            font-family: 'Playfair Display', serif;
        }

        .quote-box p {
            font-style: italic;
            font-size: 1.1rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            padding-left: 30px;
        }

        .quote-author {
            font-weight: 700;
            color: #9333ea;
            padding-left: 30px;
            display: block;
        }

        /* Newsletter Section */
        .newsletter {
            background: #f3e8ff;
            padding: 80px 5%;
            margin: 40px 5%;
            border-radius: 40px;
        }

        .newsletter-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .newsletter h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .newsletter p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .newsletter-form {
            display: flex;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter-form input {
            flex: 1;
            padding: 18px 30px;
            border: 2px solid #e9d5ff;
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .newsletter-form input:focus {
            border-color: #9333ea;
        }

        .newsletter-form button {
            background: #1a1a1a;
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .newsletter-form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Podcast Banner */
        .podcast-banner {
            background: #fdf2f8;
            padding: 60px 5%;
            margin: 0 5% 40px;
            border-radius: 40px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
            align-items: center;
        }

        .podcast-image {
            border-radius: 20px;
            overflow: hidden;
        }

        .podcast-image img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            border-radius: 20px;
        }

        .podcast-text h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .podcast-text p {
            color: #666;
            margin-bottom: 20px;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 80px 5% 40px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 60px;
            margin-bottom: 60px;
        }

        .footer-brand h3 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .footer-brand p {
            color: #999;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .
